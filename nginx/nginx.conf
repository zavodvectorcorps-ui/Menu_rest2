events {
    worker_connections 1024;
}

http {
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # Docker embedded DNS (resolves service names like "backend", "frontend").
    # valid=10s = re-resolve every 10s, поэтому при пересборке backend Nginx
    # автоматически подхватит новый IP без рестарта (фикс 502 Bad Gateway).
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ============ HTTP -> HTTPS redirect + ACME challenge ============
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ============ rest-menu.by HTTPS ============
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        server_name rest-menu.by www.rest-menu.by;

        ssl_certificate /etc/nginx/ssl/live/rest-menu.by/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/live/rest-menu.by/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        client_max_body_size 20M;

        location /api/ {
            limit_req zone=api burst=20 nodelay;
            # Динамический upstream: переменная заставляет Nginx использовать
            # resolver на каждом запросе вместо кеширования IP при старте.
            set $backend_upstream "backend:8001";
            proxy_pass http://$backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
            proxy_next_upstream error timeout http_502 http_503 http_504;
        }

        location / {
            set $frontend_upstream "frontend:80";
            proxy_pass http://$frontend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_next_upstream error timeout http_502 http_503 http_504;
        }
    }

    # ============ wm-finance.pl HTTPS ============
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        server_name wm-finance.pl www.wm-finance.pl;

        ssl_certificate /etc/nginx/ssl/live/wm-finance.pl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/live/wm-finance.pl/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        client_max_body_size 50M;

        location /api/ {
            set $wmfinance_backend "wmfinance-backend:8001";
            proxy_pass http://$wmfinance_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_next_upstream error timeout http_502 http_503 http_504;
        }

        location /webhook/ {
            set $wmfinance_backend "wmfinance-backend:8001";
            proxy_pass http://$wmfinance_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location / {
            set $wmfinance_frontend "wmfinance-frontend:3000";
            proxy_pass http://$wmfinance_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_next_upstream error timeout http_502 http_503 http_504;
        }
    }
}
