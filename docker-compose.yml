services:
  # MongoDB
  mongo:
    image: mongo:7
    restart: always
    command: ["mongod", "--auth", "--bind_ip_all"]
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: restaurant_app
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS:-CHANGE_ME}
    # NO 'ports:' section — mongo доступен ТОЛЬКО внутри docker network (backend),
    # снаружи сервера порт 27017 НЕ виден. Защита от ransomware-атак.

  # FastAPI Backend
  backend:
    build: ./backend
    restart: always
    expose:
      - "8001"
    environment:
      MONGO_URL: ${MONGO_URL:-mongodb://mongo:27017}
      DB_NAME: restaurant_app
      JWT_SECRET: ${JWT_SECRET:-CHANGE_ME_GENERATE_RANDOM_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      EMERGENT_LLM_KEY: ${EMERGENT_LLM_KEY:-sk-emergent-fD66246F32fEc2eE9E}
    volumes:
      - ./backend/uploads:/app/uploads
      # Read-only доступ для страницы «Статус доменов» — backend перечисляет
      # подключённые .conf-файлы и читает срок действия сертификатов.
      - ./nginx/custom-domains:/etc/nginx/custom-domains:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      # Docker socket — нужен для кнопки «Продлить сертификат» (суперадмин),
      # которая exec'ает в запущенный certbot-контейнер.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - mongo

  # React Frontend
  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_BACKEND_URL: ${REACT_APP_BACKEND_URL:-http://localhost}
    restart: always
    expose:
      - "80"
    depends_on:
      - backend

  # Nginx reverse proxy
  # Container name is intentionally left to docker-compose auto-naming
  # (menu_rest2-nginx-1) because wm-finance's deploy.sh targets exactly
  # that name when sending SIGHUP from outside.
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/custom-domains:/etc/nginx/custom-domains:ro
      - certbot_data:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend

  # Certbot for SSL (Let's Encrypt)
  # Auto-renews every 12h AND fully restarts the nginx container via docker
  # socket whenever a certificate is actually renewed (deploy-hook).
  # NB: we use `docker restart` (full container restart) instead of
  # `docker kill -s HUP` (= nginx -s reload) because SIGHUP does not always
  # re-read freshly issued / rotated certificates and per-domain include
  # files reliably. A full restart guarantees nginx picks up new certs and
  # new custom-domain configs.
  certbot:
    build: ./certbot
    restart: always
    volumes:
      - ./nginx/ssl:/etc/letsencrypt
      - certbot_data:/var/www/certbot
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: >-
      /bin/sh -c "trap exit TERM;
      while :; do
        certbot renew --deploy-hook 'docker restart menu_rest2-nginx-1';
        sleep 12h & wait $${!};
      done;"

volumes:
  mongo_data:
    name: menu_rest2_mongo_data
    external: true
  certbot_data:
