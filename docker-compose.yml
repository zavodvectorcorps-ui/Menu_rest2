services:
  # MongoDB
  mongo:
    image: mongo:7
    restart: always
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: restaurant_app
    ports:
      - "27017:27017"

  # FastAPI Backend
  backend:
    build: ./backend
    restart: always
    ports:
      - "8001:8001"
    environment:
      MONGO_URL: mongodb://mongo:27017
      DB_NAME: restaurant_app
      JWT_SECRET: ${JWT_SECRET:-CHANGE_ME_GENERATE_RANDOM_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    depends_on:
      - mongo

  # React Frontend
  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_BACKEND_URL: ${REACT_APP_BACKEND_URL:-http://localhost}
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot_data:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend

  # Certbot for SSL (Let's Encrypt)
  certbot:
    image: certbot/certbot
    volumes:
      - ./nginx/ssl:/etc/letsencrypt
      - certbot_data:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  mongo_data:
  certbot_data:
